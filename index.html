<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFT Market Making Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            box-sizing: border-box;
        }
        .top-panel {
            background: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .mid-price-display {
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #0f172a;
        }
        .order-book-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            height: 200px;
            align-items: center;
            position: relative;
        }
        .center-line {
            position: absolute;
            width: 1px;
            height: 100%;
            background: transparent;
            border-left: 1px dashed #94a3b8;
            left: 50%;
        }
        .book-side {
            display: flex;
            flex-direction: column;
            width: 160px;
            gap: 2px;
        }
        
        /* Level Styling */
        .level {
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
            font-size: 0.85em;
            font-family: monospace;
            cursor: default;
        }
        .level-bg {
            position: absolute;
            top: 0;
            height: 100%;
            z-index: 1;
            transition: width 0.1s;
        }
        .level-content {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            padding: 0 8px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        /* Asks (Right Side) */
        .ask-level .level-bg { left: 0; background-color: #fee2e2; }
        .ask-level .level-content { color: #7f1d1d; }
        
        /* Bids (Left Side) */
        .bid-level .level-bg { right: 0; background-color: #dcfce7; }
        .bid-level .level-content { color: #14532d; }

        /* MM Highlights */
        .mm-ask .level-bg { background-color: #bfdbfe !important; border: 1px solid #3b82f6; border-left: none; }
        .mm-ask .level-content { color: #1e3a8a; font-weight: bold; }
        
        .mm-bid .level-bg { background-color: #bfdbfe !important; border: 1px solid #3b82f6; border-right: none; }
        .mm-bid .level-content { color: #1e3a8a; font-weight: bold; }

        .mm-tag { font-size: 0.7em; color: #2563eb; font-weight: 800; }

        /* Scatter Plot Trades */
        .trade-dot {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
            animation: popOut 0.4s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: scale(0.2); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .inventory-risk {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
        }
        .inventory-risk label { font-size: 0.75em; color: #64748b; font-weight: bold; }
        .risk-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 4px;
            position: relative;
        }
        .risk-thumb {
            position: absolute;
            width: 4px;
            height: 14px;
            background: #10b981;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.2s, background-color 0.2s;
        }

        .chart-container { position: relative; height: 200px; width: 100%; margin-top: 20px; }
        
        .stats-row {
            display: flex;
            justify-content: space-evenly;
            margin: 25px 0 15px;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.75em; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .stat-val { font-size: 1.5em; font-weight: bold; color: #0f172a; }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .speed-slider { flex: 1; max-width: 200px; cursor: pointer; }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-tog { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 24px; }
        .slider-tog:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-tog { background-color: #10b981; }
        input:checked + .slider-tog:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-panel">
        <div class="mid-price-display" id="midPriceDisplay">MID: $102.37</div>
        
        <div class="inventory-risk">
            <label>Inventory Skew Risk</label>
            <div class="risk-bar">
                <div class="risk-thumb" id="riskThumb"></div>
            </div>
        </div>

        <div class="order-book-container" id="obContainer">
            <div class="center-line"></div>
            <!-- Bids (Left) -->
            <div class="book-side" id="bidsSide"></div>
            <!-- Asks (Right) -->
            <div class="book-side" id="asksSide" style="padding-top: 20px;"></div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="pnlChart"></canvas>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-label">Total PnL ($)</div>
            <div class="stat-val" id="pnlVal">0.00</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Net Inventory (Units)</div>
            <div class="stat-val" id="invVal">0</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label style="font-size:0.9em; font-weight:600; color:#475569;">Market Speed</label>
            <input type="range" id="speedSlider" class="speed-slider" min="10" max="500" value="100" style="direction: rtl;">
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <label style="font-size:0.9em; font-weight:600; color:#475569;">Market Maker Mode</label>
            <label class="switch">
                <input type="checkbox" id="mmToggle">
                <span class="slider-tog"></span>
            </label>
        </div>
    </div>
</div>

<script>
    let midPrice = 102.37;
    let totalPnl = 0;
    let cash = 0;
    let inventory = 0;
    let isMMOn = false;
    let speedMs = 300;
    
    let timeSeconds = 0;
    let chartLabels = [0];
    let chartData = [0];

    const elMid = document.getElementById('midPriceDisplay');
    const elBids = document.getElementById('bidsSide');
    const elAsks = document.getElementById('asksSide');
    const elInv = document.getElementById('invVal');
    const elPnl = document.getElementById('pnlVal');
    const elRiskThumb = document.getElementById('riskThumb');

    const ctx = document.getElementById('pnlChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
    gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

    const pnlChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartLabels,
            datasets: [{
                label: 'Total PnL ($)',
                data: chartData,
                borderColor: '#3b82f6',
                backgroundColor: gradient,
                borderWidth: 2,
                fill: true,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            scales: {
                x: { display: false },
                y: { grid: { color: '#f1f5f9' }, ticks: { font: {size: 10} } }
            },
            plugins: { legend: { display: false } }
        }
    });

    setInterval(() => {
        timeSeconds++;
        chartLabels.push(timeSeconds);
        chartData.push(totalPnl);
        if(chartLabels.length > 50) { chartLabels.shift(); chartData.shift(); }
        pnlChart.update();
    }, 1000);

    document.getElementById('mmToggle').addEventListener('change', (e) => {
        isMMOn = e.target.checked;
        if(!isMMOn) { 
            inventory = 0; 
            totalPnl = 0; 
            cash = 0;
            chartData=[0]; 
            chartLabels=[0]; 
            updateStats(); 
        }
    });
    
    document.getElementById('speedSlider').addEventListener('input', (e) => {
        speedMs = parseInt(e.target.value);
    });

    function updateStats() {
        elPnl.innerText = totalPnl.toFixed(2);
        elInv.innerText = inventory;
        
        let riskPct = Math.min(Math.max((inventory / 100) * 50, -50), 50);
        elRiskThumb.style.left = `calc(50% + ${riskPct}%)`;
        if (Math.abs(inventory) > 70) elRiskThumb.style.backgroundColor = '#ef4444';
        else if (Math.abs(inventory) > 40) elRiskThumb.style.backgroundColor = '#f59e0b';
        else elRiskThumb.style.backgroundColor = '#10b981';
    }

    function createScatterFlashes(element, isAsk) {
        let numDots = Math.floor(Math.random() * 10) + 5;
        for(let i=0; i<numDots; i++) {
            let dot = document.createElement('div');
            dot.className = 'trade-dot';
            let size = Math.random() * 6 + 4;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.background = isAsk ? 'rgba(220, 38, 38, 0.7)' : 'rgba(22, 163, 74, 0.7)';
            
            let leftOffset = isAsk ? (Math.random() * 30 + 10) : (70 - Math.random() * 30);
            dot.style.left = `${leftOffset}%`;
            dot.style.top = `calc(50% + ${(Math.random() - 0.5) * 20}px)`;
            
            element.appendChild(dot);
            setTimeout(() => dot.remove(), 400);
        }
    }

    function renderOrderBook() {
        elBids.innerHTML = '';
        elAsks.innerHTML = '';
        
        let depths = 4; // Levels index 0 to 4
        
        // Dynamic Skew Logic: MM changes its level based on inventory
        // Every 12 units of inventory shifts the MM position by 1 level
        let skewOffset = Math.floor(inventory / 12); 
        
        // If Long (skewOffset > 0): Ask level drops closer to mid (index 0) to sell aggressively. Bid level drops lower (index 4) to buy passively.
        // If Short (skewOffset < 0): Ask level rises (index 4) to sell passively. Bid level rises (index 0) to buy aggressively.
        let mmAskLevel = Math.max(0, Math.min(depths, 1 - skewOffset));
        let mmBidLevel = Math.max(0, Math.min(depths, 1 + skewOffset));

        // Render Asks
        for(let i=depths; i>=0; i--) {
            let askPrice = midPrice + ((i+1) * 0.05);
            let askVol = Math.floor(Math.random() * 80) + 10;
            let isMMAsk = isMMOn && i === mmAskLevel;
            if (isMMAsk) askVol = 50;

            let el = document.createElement('div');
            el.className = 'level ask-level' + (isMMAsk ? ' mm-ask' : '');
            
            let bgWidth = Math.min(100, (askVol / 100) * 100);
            el.innerHTML = `
                <div class="level-bg" style="width: ${bgWidth}%"></div>
                <div class="level-content">
                    <span>$${askPrice.toFixed(2)}</span>
                    <span>${isMMAsk ? '<span class="mm-tag">MM</span> ' : ''}${askVol}</span>
                </div>
            `;
            elAsks.appendChild(el);

            if (Math.random() > 0.7 && i < 3) {
                createScatterFlashes(el, true);
                if (isMMAsk) { 
                    inventory -= 1; 
                    cash += askPrice; // Sell adds to cash
                }
            }
        }

        // Render Bids
        for(let i=0; i<=depths; i++) {
            let bidPrice = midPrice - ((i+1) * 0.05);
            let bidVol = Math.floor(Math.random() * 80) + 10;
            let isMMBid = isMMOn && i === mmBidLevel;
            if (isMMBid) bidVol = 50;

            let el = document.createElement('div');
            el.className = 'level bid-level' + (isMMBid ? ' mm-bid' : '');
            
            let bgWidth = Math.min(100, (bidVol / 100) * 100);
            el.innerHTML = `
                <div class="level-bg" style="width: ${bgWidth}%"></div>
                <div class="level-content">
                    <span>${askVol = bidVol}${isMMBid ? ' <span class="mm-tag">MM</span>' : ''}</span>
                    <span>$${bidPrice.toFixed(2)}</span>
                </div>
            `;
            elBids.appendChild(el);

            if (Math.random() > 0.7 && i < 3) {
                createScatterFlashes(el, false);
                if (isMMBid) { 
                    inventory += 1; 
                    cash -= bidPrice; // Buy subtracts from cash
                }
            }
        }
        
        // Calculate Total Realized + Unrealized PnL
        totalPnl = cash + (inventory * midPrice);
        updateStats();
    }

    function loop() {
        if (Math.random() > 0.5) midPrice += 0.01; else midPrice -= 0.01;
        elMid.innerText = `MID: $${midPrice.toFixed(2)}`;
        renderOrderBook();
        setTimeout(loop, speedMs);
    }

    loop();
</script>
</body>
</html>
